<script>
// --- SECURITY GATEKEEPER ---
(function() {
    const p = new URLSearchParams(window.location.search);
    const u = p.get('uid') || localStorage.getItem("user_mobile");
    if (!u || u === "null" || u === "" || u === "undefined" || u === null) {
        window.location.replace("Login.html");
    }
})();

function checkNet() {
    if (!navigator.onLine) {
        document.body.style.pointerEvents = "none";
        document.body.style.opacity = "0.6";
        alert("❌ No Internet Connection! Please connect to internet to continue.");
        return false;
    } else {
        document.body.style.pointerEvents = "all";
        document.body.style.opacity = "1";
        return true;
    }
}
window.addEventListener('offline', checkNet);
window.addEventListener('online', checkNet);
setInterval(checkNet, 4000);
</script>
